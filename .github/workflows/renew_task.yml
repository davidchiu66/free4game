name: Free4Game 自动续期

# 配置触发条件
on:
  schedule:
    # 使用 Cron 表达式配置为每30分钟执行一次 
    - cron: '0 * * * *'
  # 保留手动触发按钮，方便随时测试
  workflow_dispatch: 

jobs:
  run-renew-script:
    # 使用最新的 Ubuntu 环境运行
    runs-on: ubuntu-latest

    steps:
      # 1. 检出你的代码仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Python 运行环境
      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装 Python 依赖和 Playwright 的浏览器内核
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium --with-deps

      # 4. 运行主脚本，并从 Secrets 中读取配置注入为环境变量
      - name: 执行续期脚本
        env:
          SERVER_ID: ${{ secrets.SERVER_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          USER_COOKIES: ${{ secrets.USER_COOKIES }}
        run: python main.py
